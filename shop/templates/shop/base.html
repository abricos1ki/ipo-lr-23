<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Интернет-магазин товаров для йоги{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0 auto; max-width: 900px; padding: 20px; color: #222; }
        header { border-bottom: 2px solid #4a7c59; padding-bottom: 10px; margin-bottom: 20px; }
        header a { margin-right: 15px; color: #4a7c59; text-decoration: none; font-weight: bold; }
        header a:hover { text-decoration: underline; }
        .product-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .product-card h3 { margin-top: 0; }
        .product-card a { color: #4a7c59; text-decoration: none; }
        .price { font-size: 1.2em; font-weight: bold; color: #4a7c59; }
        .meta { color: #666; font-size: 0.9em; }
        form.filters { margin-bottom: 20px; padding: 15px; background: #f7f7f4; border-radius: 8px; }
        form.filters select, form.filters input { margin-right: 10px; padding: 5px; }
        .pagination { margin-top: 20px; }
        .pagination a, .pagination span { margin-right: 10px; }
        footer { margin-top: 40px; border-top: 1px solid #ddd; padding-top: 10px; color: #999; font-size: 0.85em; }
    </style>
</head>
<body>
    <header>
        <a href="{% url 'shop:home' %}">Главная</a>
        <a href="{% url 'shop:product_list' %}">Каталог товаров</a>
        <a href="{% url 'shop:about_shop' %}">О магазине</a>
        <a href="{% url 'shop:about_author' %}">Об авторе</a>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        Учебный проект. Лабораторная работа №17 "Работа с Django ORM". Вариант 22.
    </footer>
</body>
</html>
